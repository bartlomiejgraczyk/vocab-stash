<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Vocab Stash</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ---- Header ---- -->
  <header class="header">
    <h1 class="header__title">Vocab Stash</h1>
    <span class="header__count" id="word-count">0 words</span>
  </header>

  <!-- ---- Tabs ---- -->
  <nav class="tabs" role="tablist">
    <button class="tabs__btn tabs__btn--active" data-tab="words" role="tab" id="tab-btn-words" aria-selected="true" aria-controls="tab-words" tabindex="0">Words</button>
    <button class="tabs__btn" data-tab="export" role="tab" id="tab-btn-export" aria-selected="false" aria-controls="tab-export" tabindex="-1">Export</button>
    <button class="tabs__btn" data-tab="settings" role="tab" id="tab-btn-settings" aria-selected="false" aria-controls="tab-settings" tabindex="-1">Settings</button>
  </nav>

  <!-- ---- Tab: Words List ---- -->
  <section class="tab-content tab-content--active" id="tab-words" role="tabpanel" aria-labelledby="tab-btn-words">
    <div class="word-list" id="word-list">
      <p class="empty-state" id="empty-state">
        No words saved yet.<br>
        Select a word on any webpage to get started.
      </p>
    </div>
    <div class="word-list__actions" id="word-list-actions" style="display: none;">
      <button class="btn btn--danger" id="clear-all-btn">Clear All</button>
    </div>
  </section>

  <!-- ---- Tab: Export ---- -->
  <section class="tab-content" id="tab-export" role="tabpanel" aria-labelledby="tab-btn-export">
    <div class="export-section">
      <label class="label" for="separator-select">Separator</label>
      <select id="separator-select" class="select">
        <option value="\t">Tab (Quizlet default)</option>
        <option value=",">Comma</option>
        <option value=";">Semicolon</option>
        <option value=" - ">Dash</option>
      </select>
    </div>

    <div class="export-section">
      <label class="label">Preview</label>
      <textarea class="export-textarea" id="export-textarea" readonly rows="10"
        placeholder="No words to export yet."></textarea>
    </div>

    <div class="export-actions">
      <button class="btn btn--primary" id="copy-btn">Copy to Clipboard</button>
    </div>
    <p class="copy-feedback" id="copy-feedback"></p>
  </section>

  <!-- ---- Tab: Settings ---- -->
  <section class="tab-content" id="tab-settings" role="tabpanel" aria-labelledby="tab-btn-settings">
    <div class="setting-group">
      <label class="label" for="source-lang">Source Language</label>
      <select id="source-lang" class="select">
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="nl">Dutch</option>
        <option value="sv">Swedish</option>
        <option value="ru">Russian</option>
        <option value="uk">Ukrainian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ko">Korean</option>
      </select>
    </div>

    <div class="setting-group">
      <label class="label" for="target-lang">Target Language</label>
      <select id="target-lang" class="select">
        <option value="pl">Polish</option>
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="nl">Dutch</option>
        <option value="sv">Swedish</option>
        <option value="ru">Russian</option>
        <option value="uk">Ukrainian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ko">Korean</option>
      </select>
    </div>

    <div class="setting-actions">
      <button class="btn btn--primary" id="save-settings-btn">Save Settings</button>
    </div>
    <p class="settings-feedback" id="settings-feedback"></p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
