name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Expected: X.Y.Z (e.g. 1.0.0)"
            exit 1
          fi

      - name: Verify manifest.json version matches
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$MANIFEST_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match release version (${{ inputs.version }}). Update manifest.json before releasing."
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists on remote"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Package extension
        run: |
          mkdir -p build/vocab-stash
          cp manifest.json background.js content.js content.css shadow.css build/vocab-stash/
          cp -r popup build/vocab-stash/
          cp -r icons build/vocab-stash/
          cd build
          zip -r "../vocab-stash-${{ inputs.version }}.zip" vocab-stash/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: vocab-stash-${{ inputs.version }}.zip
